services:
  you-n-i-verse-os:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: you-n-i-verse-os
    restart: unless-stopped
    ports:
      - "${STUDIO_PORT:-5000}:5000"
      - "${SYNTHIA_PORT:-10000}:10000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NODE_MODE: ${NODE_MODE:-full}
      PORT: 5000
      SYNTHIA_NODE_PORT: 10000
      SYNTHIA_PYTHON_PORT: 8001
      SYNTHIA_URL: http://localhost:8001
      VITE_SYNTHIA_API_URL: ${VITE_SYNTHIA_API_URL:-http://localhost:10000}
      VITE_SYNTHIA_WS_URL: ${VITE_SYNTHIA_WS_URL:-ws://localhost:10000/ws}

      LINUX_CONTAINER_ENABLED: "true"
      LINUX_CONTAINER_WORKDIR: /workspace
      LINUX_CONTAINER_SHELL: /bin/bash
      MESH_DATA_DIR: /workspace
      PYTHON_API_AUTOSTART: "false"
      PYTHON_API_URL: http://localhost:8001

      SUPABASE_PRIMARY_URL: ${SUPABASE_PRIMARY_URL:-https://leisphnjslcuepflefri.supabase.co}
      SUPABASE_PRIMARY_KEY: ${SUPABASE_PRIMARY_KEY:-}
      SUPABASE_SECONDARY_URL: ${SUPABASE_SECONDARY_URL:-}
      SUPABASE_SECONDARY_KEY: ${SUPABASE_SECONDARY_KEY:-}
      SUPABASE_APP_BUCKET: ${SUPABASE_APP_BUCKET:-synthia-apps}

      TERMINAL_TOKEN: ${TERMINAL_TOKEN:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}

      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      KIMI_API_KEY: ${KIMI_API_KEY:-}
      HF_TOKEN: ${HF_TOKEN:-}
      HF_REPO_ID: ${HF_REPO_ID:-stellarproximology/Trident}
      TRIDENT_ONNX_ENABLED: ${TRIDENT_ONNX_ENABLED:-false}
      TRIDENT_MODEL_URL: ${TRIDENT_MODEL_URL:-}

      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GOOGLE_ACCESS_TOKEN: ${GOOGLE_ACCESS_TOKEN:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    volumes:
      - ./workspace:/workspace
      - you-n-i-verse-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 8s
      retries: 3
      start_period: 45s

volumes:
  you-n-i-verse-data:
