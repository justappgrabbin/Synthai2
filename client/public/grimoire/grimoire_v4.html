let simDuration = '30s';
let simRunning = false;
let simRecording = false;
let simPhase = 'intro';
let simPhaseTimer = 0;
let simFrame = 0;
let simChars = [];
let simProps = [];
let simNarrative = [];
let simInsight = '';
let simAnimId = 0;
let simScenario = null;

function setSimDuration(d) { simDuration = d; initForge(); }

function startSimulation() {
  if (simRunning) { stopSimulation(); return; }

  const pattern = detectedPattern;
  const scenarioData = getScenario(pattern.suggestedHexagram);
  simScenario = {
    title: `${scenarioData.name} — ${pattern.metaphor}`,
    hexagram: pattern.suggestedHexagram,
    setting: scenarioData.setting,
    cast: scenarioData.characters.map((c, i) => ({
      role: i === 0 && pattern.entities[0] ? `${pattern.entities[0]} (as ${c.role})` : c.role,
      archetype: c.archetype,
      behavior: c.behavior,
    })),
    interaction: scenarioData.interaction,
    revelation: scenarioData.revelation,
    duration: simDuration,
  };

  const canvas = document.getElementById('simCanvas');
  const w = canvas.width / 2;
  const h = canvas.height / 2;

  simChars = simScenario.cast.map((c, i) => ({
    id: c.role,
    x: w * 0.3 + (i * w * 0.25),
    y: h * 0.6,
    vx: 0, vy: 0,
    state: 'idle',
    emotion: 0.5,
    archetype: c.archetype,
  }));

  simProps = [];
  if (simScenario.setting.includes('pond') || simScenario.setting.includes('water')) {
    simProps.push({ id: 'water', x: w / 2, y: h * 0.7, state: 'calm', value: 0 });
    simProps.push({ id: 'bread', x: w / 2, y: h * 0.5, state: 'floating', value: 1 });
  }
  if (simScenario.setting.includes('mountain') || simScenario.setting.includes('boulder')) {
    simProps.push({ id: 'boulder', x: w * 0.7, y: h * 0.5, state: 'solid', value: 1 });
  }
  if (simScenario.setting.includes('door') || simScenario.setting.includes('exit')) {
    simProps.push({ id: 'door', x: w * 0.85, y: h * 0.4, state: 'closed', value: 0 });
  }
  if (simScenario.setting.includes('bridge')) {
    simProps.push({ id: 'bridge', x: w / 2, y: h * 0.5, state: 'fragile', value: 0.3 });
  }
  if (simScenario.setting.includes('fire') || simScenario.setting.includes('burn')) {
    simProps.push({ id: 'fire', x: w * 0.3, y: h * 0.6, state: 'burning', value: 0.7 });
  }
  if (simScenario.setting.includes('mirror') || simScenario.setting.includes('lake') || simScenario.setting.includes('reflection')) {
    simProps.push({ id: 'mirror', x: w / 2, y: h * 0.5, state: 'clear', value: 1 });
  }

  simRunning = true;
  simPhase = 'intro';
  simPhaseTimer = 0;
  simFrame = 0;
  simNarrative = [];

  document.getElementById('narrativeLog').style.display = 'block';
  advancePhase('intro');
  simLoop();

  const panel = document.getElementById('forgePanel');
  const btn = panel.querySelector('[onclick="startSimulation()"]');
  if (btn) { btn.textContent = '⏹ Stop'; btn.classList.add('forge-btn-danger'); }
}

function stopSimulation() {
  simRunning = false;
  cancelAnimationFrame(simAnimId);
  if (simRecording) toggleRecording();

  const panel = document.getElementById('forgePanel');
  const btn = panel.querySelector('.forge-btn-danger');
  if (btn) { btn.textContent = '🎬 Start Simulation'; btn.classList.remove('forge-btn-danger'); }
}

function advancePhase(phase) {
  simPhase = phase;
  simPhaseTimer = 0;

  const narratives = {
    intro: [`Scene: ${simScenario.setting}`, `You see ${simScenario.cast.map(c => c.role.toLowerCase()).join(', ')}.`, simScenario.metaphor],
    setup: [`${simScenario.cast[0]?.role} begins to act...`, `The situation unfolds as it always has.`, `Watch carefully. Do you recognize this?`],
    conflict: [`The tension rises. The pattern activates.`, `${simScenario.cast[0]?.role} and ${simScenario.cast[1]?.role} are in the same loop.`, `Neither can see what you can see from here.`],
    revelation: [simScenario.revelation, `This is your pattern, shown in symbols.`, `The characters don't know they're in a story. But you do.`],
    resolution: [`The scene ends. The pattern is visible now.`, `What will you do with this recognition?`, `The grimoire has recorded your insight.`],
  };

  const lines = narratives[phase] || ['...'];
  lines.forEach((line, i) => { setTimeout(() => addNarrative(line), i * 1500); });

  if (phase === 'resolution') {
    document.getElementById('logBtn').style.display = 'inline-block';
  }
}

function addNarrative(text) {
  simNarrative.unshift(text);
  if (simNarrative.length > 20) simNarrative.pop();

  const log = document.getElementById('narrativeLog');
  if (log) {
    log.innerHTML = `
      <div class="narrative-title">Scene Narrative</div>
      ${simNarrative.map((line, i) => `<div class="narrative-line" style="${i === 0 ? 'color:var(--text)' : ''}">${i === 0 ? '▸ ' : ''}${line}</div>`).join('')}
    `;
  }
}

function simLoop() {
  if (!simRunning) return;
  simFrame++;
  simPhaseTimer++;

  const canvas = document.getElementById('simCanvas');
  const ctx = canvas.getContext('2d');
  const w = canvas.width / 2;
  const h = canvas.height / 2;

  ctx.fillStyle = 'rgba(5, 5, 8, 0.15)';
  ctx.fillRect(0, 0, w, h);

  const phaseDuration = simDuration === '30s' ? 180 : 1800;
  if (simPhaseTimer > phaseDuration / 5) {
    const phases = ['intro', 'setup', 'conflict', 'revelation', 'resolution'];
    const currentIdx = phases.indexOf(simPhase);
    if (currentIdx < phases.length - 1) {
      advancePhase(phases[currentIdx + 1]);
    }
  }

  drawSetting(ctx, w, h);
  simChars.forEach((char, i) => { updateSimChar(char, i, w, h); drawSimChar(ctx, char, i); });
  simProps.forEach(prop => { updateSimProp(prop); drawSimProp(ctx, prop); });

  ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
  ctx.fillRect(10, h - 20, (simPhaseTimer / (phaseDuration / 5)) * 100, 3);

  const telemetry = document.getElementById('forgeTelemetry');
  if (telemetry) {
    telemetry.innerHTML = `
      <span>Phase: <span>${simPhase}</span></span>
      <span>Frame: <span>${simFrame}</span></span>
    `;
  }

  simAnimId = requestAnimationFrame(simLoop);
}

function drawSetting(ctx, w, h) {
  if (simScenario.setting.includes('pond') || simScenario.setting.includes('water')) {
    ctx.fillStyle = 'rgba(6, 182, 212, 0.05)';
    ctx.fillRect(0, h * 0.6, w, h * 0.4);
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.ellipse(w / 2, h * 0.75 + i * 15, 60 + i * 20 + Math.sin(simFrame * 0.05) * 5, 10 + i * 3, 0, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(6, 182, 212, ${0.05 - i * 0.01})`;
      ctx.stroke();
    }
  }
  if (simScenario.setting.includes('mountain') || simScenario.setting.includes('field')) {
    ctx.fillStyle = 'rgba(34, 197, 94, 0.03)';
    ctx.fillRect(0, h * 0.5, w, h * 0.5);
    ctx.beginPath();
    ctx.moveTo(0, h * 0.5);
    ctx.lineTo(w, h * 0.5);
    ctx.strokeStyle = 'rgba(34, 197, 94, 0.1)';
    ctx.stroke();
  }
  if (simScenario.setting.includes('fire') || simScenario.setting.includes('burn')) {
    ctx.fillStyle = `rgba(239, 68, 68, ${0.03 + Math.sin(simFrame * 0.1) * 0.02})`;
    ctx.fillRect(0, 0, w, h);
  }
}

function updateSimChar(char, i, w, h) {
  const cast = simScenario.cast[i];
  if (!cast) return;
  switch (simPhase) {
    case 'intro': char.emotion = 0.5; char.vx *= 0.9; char.vy *= 0.9; break;
    case 'setup':
      if (cast.behavior.includes('toward') || cast.behavior.includes('approach')) char.vx += 0.1;
      if (cast.behavior.includes('mirror') || cast.behavior.includes('follow')) {
        const other = simChars[(i + 1) % simChars.length];
        if (other) { char.vx += (other.x - char.x) * 0.001; char.vy += (other.y - char.y) * 0.001; }
      }
      break;
    case 'conflict':
      char.emotion = Math.min(1, char.emotion + 0.01);
      if (cast.behavior.includes('aggressive') || cast.behavior.includes('fight')) {
        const other = simChars[(i + 1) % simChars.length];
        if (other) { char.vx += (other.x - char.x) * 0.003; char.vy += (other.y - char.y) * 0.003; }
      }
      if (cast.behavior.includes('avoid') || cast.behavior.includes('retreat')) {
        const other = simChars[(i + 1) % simChars.length];
        if (other) { char.vx -= (other.x - char.x) * 0.002; char.vy -= (other.y - char.y) * 0.002; }
      }
      break;
    case 'revelation': char.emotion = Math.max(0, char.emotion - 0.02); char.vx *= 0.95; char.vy *= 0.95; break;
    case 'resolution': char.vx *= 0.9; char.vy *= 0.9; break;
  }
  char.x += char.vx; char.y += char.vy;
  char.x = Math.max(20, Math.min(w - 20, char.x));
  char.y = Math.max(20, Math.min(h - 20, char.y));
}

function drawSimChar(ctx, char, i) {
  const cast = simScenario.cast[i];
  if (!cast) return;
  const x = char.x, y = char.y;
  const size = 12 + char.emotion * 4;

  if (char.emotion > 0.7) {
    ctx.beginPath();
    ctx.arc(x, y, size + 8, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(239, 68, 68, ${(char.emotion - 0.7) * 0.3})`;
    ctx.fill();
  }

  ctx.beginPath();
  ctx.arc(x, y, size, 0, Math.PI * 2);
  const colors = { duck: '#fbbf24', mountain: '#78716c', sun: '#f59e0b', river: '#06b6d4', tree: '#22c55e', wind: '#94a3b8', fire: '#ef4444', mirror: '#e2e8f0', door: '#a855f7', bridge: '#d97706' };
  ctx.fillStyle = colors[cast.archetype] || '#94a3b8';
  ctx.fill();

  ctx.fillStyle = '#0f172a';
  ctx.font = `${size}px monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const symbols = { duck: '🦆', mountain: '⛰', sun: '☀', river: '≈', tree: '🌳', wind: '〜', fire: '🔥', mirror: '◊', door: '⛩', bridge: '═' };
  ctx.fillText(symbols[cast.archetype] || '●', x, y);

  ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
  ctx.font = '8px sans-serif';
  ctx.fillText(cast.role.split('(')[0].trim(), x, y + size + 10);

  ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
  ctx.fillRect(x - 10, y - size - 8, 20, 3);
  ctx.fillStyle = char.emotion > 0.7 ? '#ef4444' : char.emotion > 0.4 ? '#fbbf24' : '#22c55e';
  ctx.fillRect(x - 10, y - size - 8, 20 * char.emotion, 3);
}

function updateSimProp(prop) {
  switch (prop.id) {
    case 'water': prop.value = Math.sin(simFrame * 0.03) * 0.5 + 0.5; break;
    case 'bread': if (simPhase === 'conflict') prop.value = Math.max(0, prop.value - 0.005); break;
    case 'fire': prop.value = 0.5 + Math.sin(simFrame * 0.1) * 0.3; break;
    case 'mirror': if (simPhase === 'revelation') prop.value = Math.min(1, prop.value + 0.02); break;
    case 'door': if (simPhase === 'resolution') prop.value = Math.min(1, prop.value + 0.03); break;
    case 'bridge': if (simPhase === 'revelation') prop.value = Math.min(1, prop.value + 0.02); break;
  }
}

function drawSimProp(ctx, prop) {
  const x = prop.x, y = prop.y;
  switch (prop.id) {
    case 'water':
      ctx.fillStyle = `rgba(6, 182, 212, ${0.1 + prop.value * 0.1})`;
      ctx.fillRect(0, y, ctx.canvas.width / 2, ctx.canvas.height / 2 - y);
      break;
    case 'bread':
      if (prop.value > 0.1) { ctx.fillStyle = '#d97706'; ctx.fillRect(x - 5, y - 3, 10 * prop.value, 6); }
      break;
    case 'boulder':
      ctx.fillStyle = '#57534e';
      ctx.beginPath(); ctx.arc(x, y, 25, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#78716c'; ctx.font = '20px monospace'; ctx.textAlign = 'center';
      ctx.fillText('🪨', x, y + 5);
      break;
    case 'door':
      ctx.fillStyle = `rgba(168, 85, 247, ${prop.value * 0.5})`;
      ctx.fillRect(x - 15, y - 25, 30, 50);
      ctx.strokeStyle = `rgba(168, 85, 247, ${0.3 + prop.value * 0.7})`;
      ctx.lineWidth = 2; ctx.strokeRect(x - 15, y - 25, 30, 50);
      if (prop.value > 0.5) { ctx.fillStyle = '#a855f7'; ctx.font = '12px monospace'; ctx.fillText('EXIT', x, y); }
      break;
    case 'bridge':
      ctx.strokeStyle = `rgba(217, 119, 6, ${0.3 + prop.value * 0.7})`;
      ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(x - 40, y); ctx.lineTo(x + 40, y); ctx.stroke();
      ctx.strokeStyle = `rgba(217, 119, 6, ${prop.value * 0.5})`;
      ctx.beginPath(); ctx.moveTo(x - 30, y); ctx.lineTo(x - 30, y + 20); ctx.moveTo(x + 30, y); ctx.lineTo(x + 30, y + 20); ctx.stroke();
      break;
    case 'fire':
      ctx.fillStyle = `rgba(239, 68, 68, ${prop.value * 0.3})`;
      ctx.beginPath(); ctx.arc(x, y, 20 + Math.sin(simFrame * 0.2) * 5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = `rgba(251, 191, 36, ${prop.value * 0.5})`;
      ctx.beginPath(); ctx.arc(x, y - 5, 12 + Math.sin(simFrame * 0.3) * 3, 0, Math.PI * 2); ctx.fill();
      break;
    case 'mirror':
      ctx.fillStyle = `rgba(226, 232, 240, ${prop.value * 0.2})`;
      ctx.fillRect(x - 30, y - 40, 60, 80);
      ctx.strokeStyle = `rgba(226, 232, 240, ${0.2 + prop.value * 0.5})`;
      ctx.lineWidth = 2; ctx.strokeRect(x - 30, y - 40, 60, 80);
      if (prop.value > 0.7) { ctx.fillStyle = 'rgba(255, 255, 255, 0.1)'; ctx.fillRect(x - 20, y - 30, 40, 60); }
      break;
  }
}

function handleSimClick(e) {
  if (!simRunning) return;
  const canvas = document.getElementById('simCanvas');
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * 2;
  const my = (e.clientY - rect.top) * 2;

  for (const char of simChars) {
    const dx = mx - char.x, dy = my - char.y;
    if (Math.sqrt(dx * dx + dy * dy) < 20) {
      char.emotion = Math.min(1, char.emotion + 0.2);
      addNarrative(`${char.id} reacts to your attention...`);
      return;
    }
  }

  for (const prop of simProps) {
    const dx = mx - prop.x, dy = my - prop.y;
    if (Math.sqrt(dx * dx + dy * dy) < 30) {
      if (prop.id === 'door') { prop.value = Math.min(1, prop.value + 0.3); addNarrative('The door responds to your push...'); }
      if (prop.id === 'boulder') { prop.x += 2; addNarrative('The boulder shifts slightly. But it is heavy.'); }
      if (prop.id === 'mirror') { prop.value = Math.min(1, prop.value + 0.2); addNarrative('The reflection clarifies. You see more clearly.'); }
      return;
    }
  }

  simPhaseTimer += 30;
}

function toggleRecording() {
  const btn = document.getElementById('recordBtn');
  if (!simRecording) {
    const canvas = document.getElementById('simCanvas');
    recordedChunks = [];
    const stream = canvas.captureStream(30);
    mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9' });
    mediaRecorder.ondataavailable = e => { if (e.data && e.data.size > 0) recordedChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      const blob = new Blob(recordedChunks, { type: 'video/webm' });
      const videoUrl = URL.createObjectURL(blob);
      addSituationEntry(simInsight, blob, videoUrl);
    };
    mediaRecorder.start(1000);
    simRecording = true;
    btn.textContent = '⏹ Stop Recording';
    btn.classList.add('recording');
  } else {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    simRecording = false;
    btn.textContent = '🔴 Record';
    btn.classList.remove('recording');
  }
}

function logInsight() {
  const viewport = document.getElementById('forgeViewport');
  const existing = viewport.querySelector('.insight-box');
  if (!existing) {
    const div = document.createElement('div');
    div.className = 'insight-box';
    div.innerHTML = `
      <div class="insight-label">Your Insight</div>
      <textarea class="insight-textarea" id="insightText" placeholder="What did you see in the simulation? How does it relate to your situation?" rows="2"></textarea>
      <div style="margin-top:8px;display:flex;gap:8px">
        <button class="forge-btn forge-btn-amber" onclick="submitInsight()">✓ Save Insight</button>
        <button class="forge-btn" onclick="skipInsight()">Skip</button>
      </div>
    `;
    viewport.appendChild(div);
  }
}

function submitInsight() {
  simInsight = document.getElementById('insightText').value;
  if (simRecording) toggleRecording();
  else { addSituationEntry(simInsight, null, null); }
}

function skipInsight() {
  simInsight = '';
  if (simRecording) toggleRecording();
  else addSituationEntry('', null, null);
}

function addSituationEntry(insight, blob, videoUrl) {
  const content = `## Situation Simulation: ${simScenario.title}\n\n**Pattern:** ${simScenario.hexagram} — ${simScenario.setting}\n\n**Revelation:**\n${simScenario.revelation}\n\n**Your Insight:**\n${insight || "(No insight recorded yet)"}\n\n**Cast:**\n${simScenario.cast.map(c => `- ${c.role}: ${c.behavior}`).join('\n')}\n\n*The simulation was generated from your journal entries. The characters represent real people in your life, abstracted into archetypes. The scenario reveals the pattern you couldn't see from inside it.*`;

  const entry = {
    id: Date.now().toString() + Math.random().toString(36).slice(2, 6),
    timestamp: new Date().toISOString(),
    type: 'situation',
    content,
    echo: generateEcho({ type: 'situation', content: insight, tags: ['situation', 'simulation', 'pattern', 'insight'], resonance: 0.92 }, entries),
    tags: ['situation', 'simulation', 'pattern', 'insight', `hexagram-${simScenario.hexagram}`],
    resonance: 0.92,
    links: [],
    metadata: videoUrl ? { videoUrl, scenarioTitle: simScenario.title, hexagram: simScenario.hexagram } : null,
  };
  entries.unshift(entry);
  saveEntries();
  switchView('feed');
}

// ═══════════════════════════════════════════════════════════════════════════════
//  PATTERN CHECK & STATS
// ═══════════════════════════════════════════════════════════════════════════════
function checkPattern() {
  if (entries.length >= 3) {
    detectedPattern = detectPattern();
    if (detectedPattern.confidence > 0.5) {
      const alert = document.getElementById('patternAlert');
      alert.innerHTML = `
        <div class="pattern-alert">
          <div class="pattern-alert-title">Pattern Detected</div>
          <div class="pattern-alert-type">${detectedPattern.type.replace('_', ' ')}</div>
          <div class="pattern-alert-meta">${detectedPattern.metaphor}</div>
          <button class="pattern-alert-btn" onclick="switchView('forge')">🎭 Simulate This</button>
        </div>
      `;
    }
  }
}

function updateStats() {
  document.getElementById('statTotal').textContent = entries.length;
  const divs = entries.filter(e => e.type === 'divination').length;
  const sims = entries.filter(e => e.type === 'situation').length;
  const jupys = entries.filter(e => e.type === 'jupyter').length;
  const builds = entries.filter(e => e.type === 'builder').length;
  const keystones = entries.filter(e => e.resonance > 0.8).length;
  const avg = entries.length > 0 ? (entries.reduce((a, b) => a + b.resonance, 0) / entries.length * 100).toFixed(0) : '0';
  const links = entries.reduce((a, b) => a + b.links.length, 0);

  const section = document.querySelector('.sidebar-section:nth-of-type(3)');
  if (section) {
    section.innerHTML = `
      <div class="sidebar-label">Resonance Stats</div>
      <div class="stat-row"><span class="stat-label">Total Entries</span><span class="stat-value" style="color:var(--text)">${entries.length}</span></div>
      <div class="stat-row"><span class="stat-label">Divinations</span><span class="stat-value" style="color:#fb7185">${divs}</span></div>
      <div class="stat-row"><span class="stat-label">Simulations</span><span class="stat-value" style="color:var(--teal)">${sims}</span></div>
      <div class="stat-row"><span class="stat-label">Notebooks</span><span class="stat-value" style="color:var(--gold)">${jupys}</span></div>
      <div class="stat-row"><span class="stat-label">Layouts</span><span class="stat-value" style="color:var(--emerald)">${builds}</span></div>
      <div class="stat-row"><span class="stat-label">Keystones</span><span class="stat-value" style="color:var(--gold)">${keystones}</span></div>
      <div class="stat-row"><span class="stat-label">Avg Resonance</span><span class="stat-value" style="color:var(--emerald)">${avg}%</span></div>
      <div class="stat-row"><span class="stat-label">Connections</span><span class="stat-value" style="color:#818cf8">${links}</span></div>
    `;
  }
}

// ─── ENTRY TYPE SWITCHING ────────────────────────────────────────────────────
function setEntryType(type) {
  currentType = type;
  document.querySelectorAll('.type-btn').forEach(btn => {
    btn.className = 'type-btn';
    if (btn.dataset.type === type) btn.classList.add(`active-${type}`);
  });
  if (currentView !== 'feed') switchView('feed');
  else renderFeed();
}

// ─── INIT ────────────────────────────────────────────────────────────────────
function init() {
  updateStats();
  checkPattern();
  renderFeed();
}

init();
  </script>
