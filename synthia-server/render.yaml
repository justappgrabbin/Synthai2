services:
  - type: web
    name: synthia-node
    runtime: node
    buildCommand: npm install
    startCommand: npm run start:lite
    envVars:
      - key: NODE_VERSION
        value: 24
      - key: NODE_MODE
        value: lite
      - key: TRIDENT_ONNX_ENABLED
        value: false
      - key: PYTHON_BRIDGE_URL
        sync: false
      - key: SUPABASE_PRIMARY_URL
        sync: false
      - key: SUPABASE_PRIMARY_KEY
        sync: false
      - key: PORT
        value: 10000

  - type: web
    name: synthia-python
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python render-server.py
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
