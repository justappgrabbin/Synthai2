services:
  synthia-server:
    build:
      context: .
    container_name: synthia-server
    restart: unless-stopped
    ports:
      - "${SYNTHIA_SERVER_PORT:-10000}:10000"
    environment:
      NODE_ENV: production
      NODE_MODE: full
      PORT: 10000
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      TRIDENT_ONNX_ENABLED: ${TRIDENT_ONNX_ENABLED:-false}
      TERMINAL_TOKEN: ${TERMINAL_TOKEN:-}
      SUPABASE_PRIMARY_URL: ${SUPABASE_PRIMARY_URL:-}
      SUPABASE_PRIMARY_KEY: ${SUPABASE_PRIMARY_KEY:-}
      SUPABASE_SECONDARY_URL: ${SUPABASE_SECONDARY_URL:-}
      SUPABASE_SECONDARY_KEY: ${SUPABASE_SECONDARY_KEY:-}
